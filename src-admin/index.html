<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0"
        />
        <title>NIBE REST API</title>
        <style>
            html,
            body,
            #root {
                height: 100%;
                margin: 0;
            }

            body {
                overflow-y: auto !important;
                overflow-x: hidden !important;
            }

            #root {
                overflow-y: auto !important;
            }
        </style>
        <script>
            window.showAdminBootstrapError = function (message) {
                const root = document.getElementById("root");
                if (!root) {
                    return;
                }
                root.innerHTML = `<pre style="margin:16px;padding:16px;border-radius:8px;background:#2b1d1d;color:#ffd7d7;white-space:pre-wrap;font:13px/1.45 monospace;">${message}</pre>`;
            };

            window.addEventListener("error", event => {
                const message = event?.error?.stack || event?.message || "Unknown admin error";
                window.showAdminBootstrapError(`React admin error:\n${message}`);
            });

            window.addEventListener("unhandledrejection", event => {
                const reason = event?.reason;
                const message =
                    reason?.stack ||
                    reason?.message ||
                    (typeof reason === "string" ? reason : JSON.stringify(reason, null, 2));
                window.showAdminBootstrapError(`React admin promise error:\n${message}`);
            });

            const script = document.createElement("script");
            window.registerSocketOnLoad = function (cb) {
                window.socketLoadedHandler = cb;
            };
            const parts = (window.location.search || "").replace(/^\?/, "").split("&");
            const query = {};
            parts.forEach(item => {
                const [name, val] = item.split("=");
                query[decodeURIComponent(name)] = val !== undefined ? decodeURIComponent(val) : true;
            });
            script.onload = function () {
                typeof window.socketLoadedHandler === "function" && window.socketLoadedHandler();
            };
            script.onerror = function () {
                window.showAdminBootstrapError("Socket library could not be loaded from ../../lib/js/socket.io.js");
            };
            script.src =
                window.location.port === "3000"
                    ? `${window.location.protocol}//${query.host || window.location.hostname}:${query.port || 8081}/lib/js/socket.io.js`
                    : "./../../lib/js/socket.io.js";

            document.head.appendChild(script);
        </script>
    </head>
    <body>
        <div id="root"></div>
        <script
            type="module"
            src="./src/main.tsx"
        ></script>
    </body>
</html>
