version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: cron
      cronjob: "17 3 6 * *"
      timezone: Europe/Berlin
    open-pull-requests-limit: 15
    assignees:
      - maxik690
    versioning-strategy: increase

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: cron
      cronjob: "41 4 18 * *"
      timezone: Europe/Berlin
    open-pull-requests-limit: 15
    assignees:
      - maxik690
